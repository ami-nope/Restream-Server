# SRS Configuration for Restream Server
# Minimal config: RTMP ingest + HTTP callbacks to backend
# No transcoding, no HLS, no recording

listen              1935;
max_connections     100;
daemon              off;
srs_log_tank        console;

# HTTP API for stats
http_api {
    enabled         on;
    listen          1985;
}

# HTTP Server (for SRS console, optional)
http_server {
    enabled         on;
    listen          8080;
}

vhost __defaultVhost__ {
    # Disable GOP cache for lower latency
    gop_cache       off;
    queue_length    10;

    # TCP settings for stability
    tcp_nodelay     on;
    min_latency     on;

    # HTTP callbacks to notify backend of stream events
    http_hooks {
        enabled         on;
        on_publish      http://app:3001/api/srs/on_publish;
        on_unpublish    http://app:3001/api/srs/on_unpublish;
    }
}
